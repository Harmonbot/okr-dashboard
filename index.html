              <div className="flex items-center justify-between">
                <div className="flex items-center gap-3">
                  <div className="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center font-bold">
                    {node.order}
                  </div>
                  <div>
                    <h3 className="font-bold text-lg">{node.name}</h3>
                    <div className="text-white/70 text-sm">
                      {node.role && `默认负责：${node.role}`}
                      {node.days > 0 && ` · 预计 ${node.days} 天`}
                    </div>
                  </div>
                </div>
                <button onClick={onClose} className="text-white/80 hover:text-white text-xl">×</button>
              </div>
              {node.guideUrl && (
                <a
                  href={node.guideUrl}
                  target="_blank"
                  rel="noopener noreferrer"
                  className="mt-2 inline-flex items-center gap-1.5 px-3 py-1.5 bg-white/20 hover:bg-white/30 rounded-lg text-sm text-white transition-colors"
                >
                  📖 查看指导说明（SOP）
                  <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" /></svg>
                </a>
              )}
            </div>

            {/* 统计卡片 */}
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-2 p-3 sm:p-4 bg-gray-50">
              <div className="bg-white rounded-lg p-3 text-center shadow-sm">
                <div className="text-2xl font-bold text-blue-600">{progress}%</div>
                <div className="text-xs text-gray-500">完成率</div>
              </div>
              <div className="bg-white rounded-lg p-3 text-center shadow-sm">
                <div className="text-2xl font-bold text-green-600">{completedCount}</div>
                <div className="text-xs text-gray-500">已完成</div>
              </div>
              <div className="bg-white rounded-lg p-3 text-center shadow-sm">
                <div className="text-2xl font-bold text-orange-600">{inProgressCount}</div>
                <div className="text-xs text-gray-500">进行中</div>
              </div>
              <div className="bg-white rounded-lg p-3 text-center shadow-sm">
                <div className="text-2xl font-bold text-gray-600">{pendingCount}</div>
                <div className="text-xs text-gray-500">待开始</div>
              </div>
            </div>

            {/* 进度条 */}
            <div className="px-4 py-2 bg-gray-50">
              <div className="h-2 bg-gray-200 rounded-full overflow-hidden">
                <div 
                  className="h-full bg-gradient-to-r from-green-400 to-green-500 rounded-full transition-all"
                  style={{ width: `${progress}%` }}
                />
              </div>
            </div>

            {/* 任务列表 */}
            <div className="p-4 max-h-[40vh] overflow-y-auto">
              <div className="flex items-center justify-between mb-3">
                <h4 className="text-sm font-semibold text-gray-700"><Icon name="clipboard" size={13} /> 任务列表 ({nodeTasks.length})</h4>
                <button
                  onClick={() => setShowAddForm(true)}
                  className="px-3 py-1.5 bg-purple-500 hover:bg-purple-600 text-white text-xs rounded-lg flex items-center gap-1 transition-colors"
                >
                  <Icon name="plus" size={12} /> 新增任务
                </button>
              </div>
              
              {/* 新增任务表单 */}
              {showAddForm && (() => {
                // 计算可指派的成员范围（基于当前用户角色）
                const viewerMember = currentUser ? members.find(m =>
                  m.id === currentUser.open_id || m.larkUserId === currentUser.open_id ||
                  m.name === currentUser.name || m.name === currentUser.en_name
                ) : null;
                const viewerRole = viewerMember?.permRole || '组员';
                const viewerGroup = viewerMember?.group || '';
                const viewerDept = viewerMember?.department || '';
                
                const parentProduct = product.parentId ? 
                  products.find(p => p.id === product.parentId) : null;
                const initiatorGroup = parentProduct?.initiatorGroup || product.initiatorGroup || '';
                
                const assignableMembers = (() => {
                  if (viewerRole === '管理员' || viewerRole === '总经理') return members;
                  if (viewerRole === '部门管理') {
                    return members.filter(m => m.department === viewerDept || (initiatorGroup && m.group === initiatorGroup));
                  }
                  if (viewerRole === '组别管理') {
                    const myLinkedGroups = viewerMember?.linkedGroups || [];
                    return members.filter(m => m.group === viewerGroup || (initiatorGroup && m.group === initiatorGroup) || myLinkedGroups.includes(m.group));
                  }
                  return members.filter(m => m.group === viewerGroup);
                })();
                const selectableMembers = assignableMembers.length > 0 ? assignableMembers : members;
                
                // 当前节点的时间范围（从 timelineMap）
                const nodeTimeline = timelineMap[node?.name];
                const nodeDateMin = (() => {
                  const today = new Date().toISOString().split('T')[0];
                  const nodeStart = nodeTimeline?.planStart ? new Date(nodeTimeline.planStart).toISOString().split('T')[0] : '';
                  if (!nodeStart) return today;
                  return nodeStart > today ? nodeStart : today;
                })();
                const nodeDateMax = nodeTimeline?.planEnd ? new Date(nodeTimeline.planEnd).toISOString().split('T')[0] : '';
                
                // 按组别分组
                const groupedMembers = {};
                selectableMembers.forEach(m => {
                  const g = m.group || '未分组';
                  if (!groupedMembers[g]) groupedMembers[g] = [];
                  groupedMembers[g].push(m);
                });
                
                return (
                <div className="bg-purple-50 rounded-lg p-3 mb-3 border border-purple-200">
                  <div className="flex items-center justify-between mb-2">
                    <h5 className="text-sm font-medium text-purple-700">新增任务</h5>
                    <button onClick={() => setShowAddForm(false)} className="text-gray-400 hover:text-gray-600 text-lg leading-none">×</button>
                  </div>
                  <form onSubmit={handleSubmit}>
                    <input
                      type="text"
                      value={formData.name}
                      onChange={e => setFormData({...formData, name: e.target.value})}
                      className="w-full px-3 py-1.5 border rounded-lg text-sm focus:ring-2 focus:ring-purple-300 focus:border-purple-400 outline-none mb-2"
                      placeholder="任务名称 *"
                      required
                      autoFocus
                    />
                    <div className="grid grid-cols-2 gap-2 mb-2">
                      <select
                        value={formData.priority}
                        onChange={e => setFormData({...formData, priority: e.target.value})}
                        className="px-2 py-1.5 border rounded-lg text-xs focus:ring-2 focus:ring-purple-300 outline-none"
                      >
                        <option value="P0-紧急">P0-紧急</option>
                        <option value="P1-高优">P1-高优</option>
                        <option value="P2-中等">P2-中等</option>
                        <option value="P3-低优">P3-低优</option>
                      </select>
                      <div className="relative">
                        <label className="absolute -top-1.5 left-2 px-1 bg-white text-[9px] text-gray-400 z-10">预计开始</label>
                        <input
                          type="date"
                          value={formData.plannedStartDate || new Date().toISOString().split('T')[0]}
                          onChange={e => setFormData({...formData, plannedStartDate: e.target.value})}
                          min={nodeDateMin}
                          max={nodeDateMax}
                          className="w-full px-2 py-1.5 pt-2 border rounded-lg text-xs focus:ring-2 focus:ring-purple-300 outline-none"
                          title={nodeDateMin && nodeDateMax ? `开始日期范围: ${nodeDateMin} ~ ${nodeDateMax}` : '预计开始日期'}
                        />
                      </div>
                    </div>
                    {nodeDateMin && nodeDateMax && (
                      <div className="text-[10px] text-gray-400 -mt-1 mb-2">
                        📅 本节点工期：{nodeDateMin.slice(5)} ~ {nodeDateMax.slice(5)}
                      </div>
                    )}
                    {/* 负责人 - tag按钮 */}
                    <div className="mb-2">
                      <div className="text-[10px] text-gray-400 mb-1">负责人 {formData.assignee && <span className="text-purple-500">✓</span>}</div>
                      <div className="flex flex-wrap gap-1 max-h-28 overflow-y-auto">
                        {Object.entries(groupedMembers).map(([group, gMembers]) => (
                          <React.Fragment key={group}>
                            {Object.keys(groupedMembers).length > 1 && (
                              <div className="w-full text-[9px] text-gray-300 mt-1 first:mt-0">{group}</div>
                            )}
                            {gMembers.map(m => {
                              const selected = formData.assignee === m.id;
                              return (
                                <button key={m.id} type="button"
                                  onClick={() => setFormData({...formData, assignee: selected ? '' : m.id})}
                                  className={`flex items-center gap-1 px-1.5 py-0.5 rounded-full text-xs border transition-all ${
                                    selected ? 'bg-purple-500 border-purple-500 text-white shadow-sm' : 'bg-white border-gray-200 text-gray-500 hover:border-purple-300'
                                  }`}>
                                  {m.avatarUrl ? (
                                    <img src={m.avatarUrl} alt="" className="w-4 h-4 rounded-full object-cover" />
                                  ) : (
                                    <span className={`w-4 h-4 ${m.color} rounded-full flex items-center justify-center text-white text-[8px]`}>{m.avatar}</span>
                                  )}
                                  <span>{m.name}</span>
                                </button>
                              );
                            })}
                          </React.Fragment>
                        ))}
                      </div>
                    </div>
                    <textarea
                      value={formData.description}
                      onChange={e => setFormData({...formData, description: e.target.value})}
                      className="w-full px-3 py-1.5 border rounded-lg text-xs focus:ring-2 focus:ring-purple-300 outline-none resize-none mb-2"
                      rows={1}
                      placeholder="任务描述（选填）"
                    />
                    <div className="flex gap-2">
                      <button type="button" onClick={() => setShowAddForm(false)}
                        className="flex-1 px-3 py-1.5 border border-gray-300 text-gray-500 rounded-lg text-xs hover:bg-gray-50 transition-colors">
                        取消
                      </button>
                      <button type="submit" disabled={isSubmitting}
                        className="flex-1 px-3 py-1.5 bg-purple-500 hover:bg-purple-600 text-white rounded-lg text-xs transition-colors disabled:opacity-50">
                        {isSubmitting ? '提交中...' : '创建任务'}
                      </button>
                    </div>
                  </form>
                </div>
                );
              })()}
              
              {/* 任务列表（创建表单展开时隐藏） */}
              {!showAddForm && nodeTasks.length > 0 ? (
                <div className="space-y-2">
                  {nodeTasks.map(task => {

                    const isActioning = actionTaskId === task.id;
                    
                    return (
                      <div key={task.id} className="bg-gray-50 rounded-lg p-3 hover:bg-gray-100 transition-colors">
                        <div className="flex items-start gap-3">

                          <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs flex-shrink-0 mt-0.5 ${

                          {/* 任务信息 */}
                          <div className="flex-1 min-w-0">
                            <div className={`font-medium ${task.status === '已完成' ? 'text-gray-400 line-through' : 'text-gray-800'}`}>

                            </div>
                            <div className="flex items-center gap-2 mt-1 flex-wrap">
                              {assignee ? (

                                  ) : (
                                    <span className={`w-4 h-4 ${assignee.color} rounded-full flex items-center justify-center text-white text-xs`}>

                              <span className={`text-xs px-2 py-0.5 rounded-full ${

                            </div>
                            
                            {/* 操作按钮区域 */}
                            <div className="mt-2 flex gap-2">
                              {/* 待开始状态：显示接受任务按钮（仅负责人可见） */}
                              {(task.status === '待开始' || task.status === '未开始') && isTaskAssignee(task) && (

                              {(task.status === '待开始' || task.status === '未开始') && !isTaskAssignee(task) && (

                              {task.status === '进行中' && isTaskAssignee(task) && (

                                  {showCompleteForm === task.id ? (

                                      <div className="flex gap-1 border-b pb-1">

                                      {completeMode === 'link' && (

                                      <div className="flex items-center gap-2">

                                        </button>
                                        <button
                                          onClick={() => { setShowCompleteForm(null); setOutputFile(null); setOutputLink(''); setOutputText(''); setCompleteMode('link'); }}
                                          className="px-2 py-1.5 bg-gray-200 hover:bg-gray-300 text-gray-600 text-xs rounded-lg transition-colors"
                                        >
                                          取消
                                        </button>
                                        <span className="text-[10px] text-gray-400 ml-auto">链接或文字任选一项</span>
                                      </div>
                                    </div>
                                  ) : (

                                      ✅ 完成任务
                                    </button>

                                </>
                              )}
                              
                              {/* 进行中状态：非负责人看到的提示 */}
                              {task.status === '进行中' && !isTaskAssignee(task) && (
                                <span className="text-xs text-gray-400 italic flex items-center gap-1">
                                  {assignee?.avatarUrl && (
                                    <img src={assignee.avatarUrl} alt="" className="w-4 h-4 rounded-full" />
                                  )}
                                  仅 {task.assigneeName || assignee?.name || '负责人'} 可完成

                              )}
                              
                              {/* 已完成状态：显示交付物（链接/文字） */}
                              {task.status === '已完成' && (
                                <div className="flex flex-wrap items-center gap-2 mt-1">
                                  {task.outputUrl && (() => {
                                    // 飞书链接智能显示
                                    const url = task.outputUrl;
                                    let icon = '🔗';
                                    let label = '';
                                    
                                    // 优先使用 API 解析的标题
                                    if (task.outputUrlTitle) {
                                      label = task.outputUrlTitle;
                                      if (url.includes('feishu.cn') || url.includes('larksuite.com')) icon = '📄';

                                      // 回退：从 URL 路径推断类型
                                      label = (() => { try { return new URL(url).hostname; } catch { return '查看链接'; } })();

                                        else if (url.includes('/sheets/') || url.includes('/sheet/')) label = '飞书表格';

                                      else if (url.includes('drive.google.com')) { icon = '📁'; label = 'Google 云盘'; }

                                  {task.outputText && !task.outputUrl && (

                              {/* 上传/同步进度条 */}
                              {uploadProgress[task.id] && (

                                        className={`h-full rounded-full transition-all duration-500 ${
                                          uploadProgress[task.id].phase === 'error' ? 'bg-red-400' :

                                          'bg-blue-400 animate-pulse'
                                        }`}
                                        style={{ width: uploadProgress[task.id].pct + '%' }}

                                    <span className={`text-[10px] flex-shrink-0 ${
                                      uploadProgress[task.id].phase === 'error' ? 'text-red-500' :
                                      uploadProgress[task.id].phase === 'done' ? 'text-green-500' :
                                      'text-blue-500'

                          {/* 状态标签 */}
                          <span className={`text-xs px-2 py-1 rounded flex-shrink-0 ${

              ) : !showAddForm && (
                <div className="text-center py-8 text-gray-400">
                  <div className="text-4xl mb-2">📭</div>
                  <div>该节点暂无任务</div>
                  <button
                    onClick={() => setShowAddForm(true)}
                    className="mt-3 px-4 py-2 bg-purple-100 text-purple-600 rounded-lg text-sm hover:bg-purple-200 transition-colors"
                  >
                    <Icon name="plus" size={12} /> 创建第一个任务
                  </button>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    };

    // 产品详情弹窗 - 支持DAG流程图（行轨道对齐）+ 节点点击
    const ProductDetailModal = ({ product, products = [], nodes: allNodes, nodeLayers: allNodeLayers, nodeMap: allNodeMap, nodeToLayer: allNodeToLayer, templates = {}, members, tasks, skippedNodes = new Set(), onSkippedNodesChange, onClose, onRefresh, onSelectProduct, viewer }) => {
      // 子线权限：当前用户是否可查看该子项目任务详情
      // 先从成员表匹配当前用户的部门/组别/角色信息
      const viewerMember = viewer ? members.find(m => 
        m.id === viewer.open_id || m.larkUserId === viewer.open_id || 
        m.name === viewer.name || m.name === viewer.en_name
      ) : null;
      const enrichedViewer = viewer ? {
        ...viewer,
        department: viewerMember?.department || '',
        group: viewerMember?.group || '',
        permRole: viewerMember?.permRole || '',
        linkedGroups: viewerMember?.linkedGroups || []
      } : null;
      
      const canViewDetails = (() => {
        if (isParentProject(product)) return true;
        if (!enrichedViewer) return true;
        
        // === 全局高权限：总是能看所有子线详情 ===
        if (enrichedViewer.permRole === '管理员' || enrichedViewer.permRole === '总经理') return true;
        if (enrichedViewer.open_id === product.ownerId) return true;
        
        // 找到父项目，获取发起组别
        const parentProduct = products.find(p => p.childIds?.includes(product.id));
        const initiatorGroup = parentProduct?.initiatorGroup || '';
        
        // 部门管理：如果发起组属于自己管辖的部门 → 能看该项目所有子线详情
        if (enrichedViewer.permRole === '部门管理' && initiatorGroup) {
          const initiatorMembers = members.filter(m => m.group === initiatorGroup);
          if (initiatorMembers.some(m => m.department === enrichedViewer.department)) return true;
        }
        
        // 父项目负责人也有全局权限
        if (parentProduct && enrichedViewer.open_id === parentProduct.ownerId) return true;
        
        // === 子线级权限：根据模板的「参与角色」配置 ===
        const matchTpl = Object.values(templates).find(t => t.type === product.templateType);
        const roles = matchTpl?.participantRoles || [];
        
        if (roles.length === 0) {
          // 没配置参与角色 → 降级到旧逻辑：按负责部门
          if (!product.responsibleDept) return true;
          return enrichedViewer.department === product.responsibleDept;
        }
        
        for (const role of roles) {
          switch (role) {
            case '发起组':
              if (initiatorGroup && enrichedViewer.group === initiatorGroup) return true;
              break;
            case '对应产品组':
              if (initiatorGroup && enrichedViewer.department === '产品中心' && 
                  enrichedViewer.linkedGroups?.includes(initiatorGroup)) return true;
              break;
            case '中枢部':
              if (enrichedViewer.department === '中枢部') return true;
              break;
            case '营销推广部':
              if (enrichedViewer.department === '营销推广部') return true;
              break;
            case '设计部':
              if (enrichedViewer.group === '设计部') return true;
              break;
            case '财务部':
              if (enrichedViewer.department === '财务部') return true;
              break;
          }
        }
        
        return false;
      })();
      // 根据模版类型匹配模板，筛选对应节点（父项目不匹配模板）
      const matchType = product.templateType;
      const matchingTemplateId = isParentProject(product) ? null : Object.keys(templates).find(tplId => 
        templates[tplId].type === matchType
      );
      
      // 筛选属于该模板的节点
      const nodes = matchingTemplateId 
        ? allNodes.filter(n => n.templateId === matchingTemplateId)
        : [];
      
      // 重建分层（如果筛选了节点）
      const nodeLayers = (() => {
        if (!matchingTemplateId) return [];
        const layers = [];
        const visited = new Set();
        const startNodes = nodes.filter(n => !n.prevNode || !nodes.some(nn => nn.name === n.prevNode));
        if (startNodes.length > 0) {
          layers.push(startNodes);
          startNodes.forEach(n => visited.add(n.name));
        }
        let li = 1;
        while (visited.size < nodes.length && li < 20) {
          const nextLayer = nodes.filter(n => {
            if (visited.has(n.name)) return false;
            if (!n.prevNode) return false;
            return visited.has(n.prevNode);
          });
          if (nextLayer.length === 0) break;
          layers.push(nextLayer);
          nextLayer.forEach(n => visited.add(n.name));
          li++;
        }
        return layers;
      })();
      
      const nodeMap = {};
      nodes.forEach(n => { nodeMap[n.name] = n; });
      
      const nodeToLayer = {};
      nodeLayers.forEach((layer, idx) => {
        layer.forEach(n => { nodeToLayer[n.name] = idx; });
      });
      
      const hasMatchingTemplate = matchingTemplateId || allNodes.length === 0;
      const [selectedNode, setSelectedNode] = useState(null);
      const [isCreatingChildren, setIsCreatingChildren] = useState(false);
      const currentUser = useContext(UserContext);
      const showToast = useToast();
      
      if (!product) return null;
      const productTasks = tasks.filter(t => t.productId === product.id);

      // 计算子项目时间线（用于节点上标注预计日期）
      const parentProduct = product.parentId ? products.find(p => p.id === product.parentId) : null;
      const parentStart = parentProduct?.startDate ? new Date(parentProduct.startDate) : null;
      const modalTimeline = calcSubProjectTimeline(product, parentStart, allNodes, templates);
      const timelineMap = {};
      modalTimeline.nodes.forEach(n => { timelineMap[n.name] = n; });

      // 检查当前用户是否是项目负责人（含父项目负责人）
      const isProjectOwner = !!(enrichedViewer && (
        (product.ownerId && enrichedViewer.open_id === product.ownerId) ||
        (product.ownerName && enrichedViewer.name === product.ownerName) ||
        (product.ownerName && enrichedViewer.en_name === product.ownerName) ||
        (parentProduct?.ownerId && enrichedViewer.open_id === parentProduct.ownerId) ||
        (parentProduct?.ownerName && enrichedViewer.name === parentProduct.ownerName) ||
        (parentProduct?.ownerName && enrichedViewer.en_name === parentProduct.ownerName)
      ));

      // 自动计算当前阶段
      const getAutoCurrentStage = () => {
        let lastActiveNode = null;
        for (const node of nodes) {
          const nodeTasks = productTasks.filter(t => t.stage === node.name);
          const hasActive = nodeTasks.some(t => t.status === '进行中');
          const hasCompleted = nodeTasks.some(t => t.status === '已完成');
          const hasIncomplete = nodeTasks.some(t => t.status !== '已完成');
          if (hasActive || (hasCompleted && hasIncomplete)) {
            lastActiveNode = node.name;
          }
        }
        return lastActiveNode || product.currentStage;
      };
      const autoCurrentStage = getAutoCurrentStage();

      // 找到项目负责人的成员信息
      const ownerMember = members.find(m => m.id === product.ownerId || m.name === product.ownerName || m.larkName === product.ownerName);

      // 自动计算项目进度
      const getAutoProgress = () => {
        // 父项目：聚合子项目
        if (product.childIds?.length > 0) {
          const childProducts = products.filter(p => product.childIds.includes(p.id));
          if (childProducts.length > 0) {
            const total = childProducts.reduce((sum, c) => sum + calcProjectProgress(c, allNodes, templates, tasks), 0);
            return Math.round(total / childProducts.length);
          }
        }
        if (nodes.length === 0) return product.progress;
        let totalNodeProgress = 0;
        for (const node of nodes) {
          if (skippedNodes.has(node.name)) {
            totalNodeProgress += 100; // 跳过的节点按100%
            continue;
          }
          const nodeTasks = productTasks.filter(t => t.stage === node.name);
          if (nodeTasks.length > 0) {
            const completedCount = nodeTasks.filter(t => t.status === '已完成').length;
            totalNodeProgress += (completedCount / nodeTasks.length) * 100;
          }
        }
        return Math.round(totalNodeProgress / nodes.length);
      };
      const autoProgress = getAutoProgress();

      // 获取节点状态（基于任务状态）
      const getNodeStatus = (nodeName) => {
        if (skippedNodes.has(nodeName)) return 'skipped'; // 已跳过
        const nodeTasks = productTasks.filter(t => t.stage === nodeName);
        if (nodeTasks.length === 0) return 'pending'; // 无任务 → 灰色
        const completedCount = nodeTasks.filter(t => t.status === '已完成').length;
        const inProgressCount = nodeTasks.filter(t => t.status === '进行中').length;
        if (completedCount === nodeTasks.length) return 'completed'; // 全部完成 → 绿色
        if (inProgressCount > 0 || completedCount > 0) return 'inProgress'; // 有进行中或部分完成 → 红色
        return 'pending'; // 全部未开始 → 灰色
      };

      // 跳过节点（仅项目负责人可操作）
      const handleSkipNode = (nodeName, e) => {
        e.stopPropagation();
        if (!isProjectOwner) {
          showToast?.('只有项目负责人才能跳过节点', 'error');
          return;
        }
        const isCurrentlySkipped = skippedNodes.has(nodeName);
        if (!isCurrentlySkipped) {
          if (!confirm(`确认跳过节点「${nodeName}」？\n\n跳过后，后续节点将不受此节点限制。`)) return;
        }
        onSkippedNodesChange?.(prev => {
          const next = new Set(prev);
          if (next.has(nodeName)) {
            next.delete(nodeName);
          } else {
            next.add(nodeName);
          }
          return next;
        });
        showToast?.(isCurrentlySkipped ? `已恢复节点「${nodeName}」` : `节点「${nodeName}」已跳过`, 'success');
      };

      // 构建流程链（每条链是一个独立的行）
      const buildFlowChains = () => {
        if (!nodes || nodes.length === 0) return [];
        
        // 找到所有起始节点
        const startNodes = nodes.filter(n => !n.prevNode);
        if (startNodes.length === 0) return [];
        
        const chains = [];
        const visited = new Set();
        
        // 递归构建链
        const buildChain = (node, chain = []) => {
          if (!node || visited.has(node.name)) return;
          
          chain.push(node);
          visited.add(node.name);
          
          // 获取后继节点
          const children = nodes.filter(n => n.prevNode === node.name);
          
          if (children.length === 0) {
            // 链结束
            chains.push([...chain]);
          } else if (children.length === 1) {
            // 单一后继，继续当前链
            buildChain(children[0], chain);
          } else {
            // 多个后继（分支点），为每个后继创建新链
            // 先保存当前链到分支点
            const branchPoint = [...chain];
            
            children.forEach((child, idx) => {
              if (idx === 0) {
